<body>

    <nav>

<div class="wave-divider">
    <svg viewBox="0 0 1440 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

    </svg>
</div>

<div class="games-page-wrap">

    <h2 class="section-heading">Сборы</h2>
    <div class="funding-grid" id="fundingGrid"></div>

    <h2 class="section-heading">Озвученные игры</h2>

</div>

<footer>

</footer>

<!-- ==================== МОДАЛЬНОЕ ОКНО ==================== -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="modalBox">
        <button class="modal-close" onclick="closeModal()" title="Закрыть">✕</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
/* ================================================================
   ДАННЫЕ — STATUS:
     "done"    — озвучка готова, кнопки скачать активны
     "wip"     — в работе, только демо если есть
     "funding" — на стадии сбора, только ссылка на донат
================================================================ */

const fundings = [
    {
        id: "f1",
        name:    "Spice & Wolf VR 2",
        status:  "funding",
        desc:    "Описание проекта сбора. Расскажите о чём игра и зачем нужна ваша поддержка для её озвучки на русский язык.",
        fullDesc: "Подробное описание для модалки. Здесь можно рассказать больше об игре, её сюжете, геймплее и о том, почему студия хочет её озвучить.",
        cover:   "./Sources/wolfvr.jpg",
        raised:  100,
        goal:    750000,
        fundUrl: "#",
        screenshots: ["./Sources/1.jpg", "./Sources/3.jpg"],
        video:   "YzGJ8HopFwQ",        // YouTube embed ID, например "dQw4w9WgXcQ"
        downloads: null,
        demo: null,
    },
    {
        id: "f2",
        name:    "Второй проект",
        status:  "funding",
        desc:    "Ещё один проект, который ждёт вашей поддержки. Помогите студии озвучить эту замечательную игру.",
        fullDesc: "Расширенное описание второго проекта. Игра с богатым лором и интересными персонажами, которые заиграют по-новому с русской озвучкой.",
        cover:   "",
        raised:  45000,
        goal:    200000,
        fundUrl: "#",
        screenshots: ["", ""],
        video:   "",
        downloads: null,
        demo: null,
    },
];

const games = [
    {
        id: "g1",
        name:    "Игра 1",
        status:  "done",          // готова
        badge:   "Готово",
        desc:    "Короткое описание для карточки.",
        fullDesc: "Полное описание озвученной игры. Расскажите о сюжете, жанре, особенностях озвучки и что делает её особенной.",
        cover:   "./Sources/2.jpg",
        screenshots: ["", "", ""],
        video:   "",              // YouTube embed ID
        downloads: {
            // null = скрыть кнопку, "#" или реальный URL = показать
            gdrive:  "#",         // Google Drive
            yadisk:  "#",         // Яндекс Диск
            server:  "#",         // С сервера
        },
        demo: null,               // null = нет демо
    },
    {
        id: "g2",
        name:    "Игра 2",
        status:  "done",
        badge:   "Готово",
        desc:    "Описание второй готовой игры.",
        fullDesc: "Подробное описание второй озвученной игры.",
        cover:   "./Sources/c1.png",
        screenshots: ["", ""],
        video:   "",
        downloads: {
            gdrive:  "#",
            yadisk:  null,        // Яндекс Диск недоступен
            server:  "#",
        },
        demo: {
            label: "Демо — Пролог",
            url: "#",
        },
    },
    {
        id: "g3",
        name:    "Игра 3",
        status:  "wip",           // в работе
        badge:   "В работе",
        desc:    "Работа над озвучкой в процессе.",
        fullDesc: "Мы активно работаем над этой игрой. Следите за обновлениями! Пока доступен озвученный пролог.",
        cover:   "",
        screenshots: [""],
        video:   "",
        downloads: null,          // скачать нельзя
        demo: {
            label: "Демо — Пролог",
            url: "#",
        },
    },
    {
        id: "g4",
        name:    "Игра 4",
        status:  "done",
        badge:   "Готово",
        desc:    "Ещё одна завершённая работа студии.",
        fullDesc: "Полное описание четвёртой игры. Все файлы доступны для скачивания.",
        cover:   "",
        screenshots: ["", ""],
        video:   "",
        downloads: {
            gdrive:  "#",
            yadisk:  "#",
            server:  "#",
        },
        demo: null,
    },
    {
        id: "g5",
        name:    "Игра 5",
        status:  "wip",
        badge:   "Скоро",
        desc:    "Готовится к выходу.",
        fullDesc: "Игра готовится к выходу. Пока скачать нечего, но скоро будет демо!",
        cover:   "",
        screenshots: [],
        video:   "",
        downloads: null,
        demo: null,
    },
    {
        id: "g6",
        name:    "Игра 6",
        status:  "done",
        badge:   "Готово",
        desc:    "Шестая завершённая работа.",
        fullDesc: "Подробное описание шестой игры.",
        cover:   "",
        screenshots: ["", ""],
        video:   "",
        downloads: {
            gdrive: "#",
            yadisk: "#",
            server: null,
        },
        demo: null,
    },
];

/* ================================================================
   SVG ИКОНКИ ИСТОЧНИКОВ
================================================================ */
const DL_ICONS = {
    gdrive: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.433 22l-1.7-2.944 5.667-9.817H14l-5.667 9.817zm5.734 0l5.666-9.817H22l-5.667 9.817zM12 10.944L8.333 4.5H15.667zm2.1-6.444h3.4L22 11.056h-3.4z"/></svg>`,
    yadisk: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3c1.5 0 2.8.55 3.8 1.45L7.45 15.8A5.97 5.97 0 0 1 6 12c0-3.31 2.69-6 6-6zm0 12c-1.5 0-2.8-.55-3.8-1.45l8.35-8.35A5.97 5.97 0 0 1 18 12c0 3.31-2.69 5-6 5z"/></svg>`,
    server: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
    demo:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
};

const DL_LABELS = {
    gdrive: "Google Drive",
    yadisk: "Яндекс Диск",
    server: "С сервера",
};

/* ================================================================
   ФОРМАТИРОВАНИЕ ДЕНЕГ
================================================================ */
function fmt(n) { return n.toLocaleString('ru-RU') + ' ₽'; }

/* ================================================================
   РЕНДЕР СБОРОВ
================================================================ */
function renderFundings() {
    const grid = document.getElementById('fundingGrid');
    grid.innerHTML = fundings.map(f => {
        const pct = Math.min(100, Math.round(f.raised / f.goal * 100));
        return `
        <div class="fund-card" onclick="openModal('funding','${f.id}')" style="cursor:pointer;">
            <div class="fund-cover">
                ${f.cover
                    ? `<img src="${f.cover}" alt="${f.name}">`
                    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;opacity:0.18;">
                           <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                               <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                           </svg>
                       </div>`
                }
            </div>
            <div class="fund-info">
                <p class="fund-name">${f.name}</p>
                <p class="fund-desc">${f.desc}</p>
                <div class="fund-progress-wrap">
                    <div class="fund-bar-track"><div class="fund-bar-fill" style="width:${pct}%"></div></div>
                    <div class="fund-amounts"><strong>${fmt(f.raised)}</strong><span>из ${fmt(f.goal)} · ${pct}%</span></div>
                    <button class="btn-support" onclick="event.stopPropagation();window.open('${f.fundUrl}','_blank')">Поддержать</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

/* ================================================================
   РЕНДЕР СЕТКИ ИГР
================================================================ */
function renderGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = games.map(g => `
        <div class="game-card" onclick="openModal('game','${g.id}')">
            ${g.cover
                ? `<img src="${g.cover}" alt="${g.name}">`
                : `<div class="game-card-placeholder">
                       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                           <rect x="2" y="3" width="20" height="14" rx="2"/>
                           <path d="M8 21h8M12 17v4M7 10h2M9 8v4M14 10h2"/>
                       </svg>
                       обложка
                   </div>`
            }
            <div class="game-badge ${g.status === 'done' ? 'game-badge--done' : ''}">${g.badge}</div>
            <div class="game-card-label">${g.name}</div>
        </div>`
    ).join('');
}

/* ================================================================
   РЕНДЕР СОДЕРЖИМОГО МОДАЛКИ
================================================================ */
function buildModalContent(item, type) {
    const isFunding = type === 'funding';
    const isDone    = !isFunding && item.status === 'done';

    // Бейдж
    let badgeClass = 'modal-badge';
    let badgeText  = '';
    if (isFunding)             { badgeClass += ' modal-badge--funding'; badgeText = 'Сбор'; }
    else if (item.status === 'done') { badgeText = 'Готово'; }
    else                             { badgeClass += ' modal-badge--wip'; badgeText = item.badge; }

    // Обложка
    const coverHtml = item.cover
        ? `<img src="${item.cover}" alt="${item.name}">`
        : `<div class="modal-cover-placeholder">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                   <rect x="2" y="2" width="20" height="20" rx="3"/>
                   <path d="M2 8h20M8 22V8"/>
               </svg>
           </div>`;

    // Кнопки скачать
    let dlHtml = '';
    if (isDone && item.downloads) {
        const btns = Object.entries(item.downloads)
            .filter(([, url]) => url)
            .map(([key, url]) => `
                <a href="${url}" class="btn-download" target="_blank" rel="noopener">
                    ${DL_ICONS[key]} ${DL_LABELS[key]}
                </a>`).join('');
        if (btns) {
            dlHtml = `
                <div class="modal-download">
                    <p class="download-label">Скачать озвучку</p>
                    <div class="download-btns">${btns}</div>
                </div>`;
        }
    }

    // Демо
    let demoHtml = '';
    if (item.demo) {
        demoHtml = `
            <a href="${item.demo.url}" class="btn-download btn-demo" target="_blank" rel="noopener">
                ${DL_ICONS.demo} ${item.demo.label}
            </a>`;
    }

    // Кнопка поддержать (только для сборов)
    let fundHtml = '';
    if (isFunding) {
        const pct = Math.min(100, Math.round(item.raised / item.goal * 100));
        fundHtml = `
            <div style="margin-top:auto;">
                <div class="fund-bar-track" style="margin-bottom:6px;">
                    <div class="fund-bar-fill" style="width:${pct}%"></div>
                </div>
                <div class="fund-amounts" style="margin-bottom:10px;">
                    <strong>${fmt(item.raised)}</strong>
                    <span>из ${fmt(item.goal)} · ${pct}%</span>
                </div>
                <a href="${item.fundUrl}" class="btn-support" target="_blank" rel="noopener">Поддержать проект</a>
            </div>`;
    }

    // Скриншоты
    let screensHtml = '';
    if (item.screenshots && item.screenshots.length > 0) {
        const shots = item.screenshots.map(src =>
            `<div class="modal-screenshot">
                ${src
                    ? `<img src="${src}" alt="скриншот">`
                    : `<div class="modal-screenshot-placeholder">
                           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                               <rect x="3" y="3" width="18" height="14" rx="2"/>
                               <circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                           </svg>
                           скриншот
                       </div>`
                }
            </div>`
        ).join('');
        screensHtml = `
            <div>
                <p class="modal-section-label">Скриншоты</p>
                <div class="modal-screenshots">${shots}</div>
            </div>`;
    }

    // Видео
    let videoHtml = '';
    if (item.video) {
        videoHtml = `
            <div>
                <p class="modal-section-label">Пример озвучки</p>
                <div class="modal-video-wrap">
                    <iframe
                        src="https://www.youtube.com/embed/${item.video}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen
                        loading="lazy">
                    </iframe>
                </div>
            </div>`;
    }

    return `
        <div class="modal-hero">
            <div class="modal-cover">${coverHtml}</div>
            <div class="modal-meta">
                <h2 class="modal-title">${item.name}</h2>
                <span class="${badgeClass}">${badgeText}</span>
                <p class="modal-desc">${item.fullDesc || item.desc}</p>
                ${dlHtml}
                ${demoHtml}
                ${fundHtml}
            </div>
        </div>
        <div class="modal-body">
            ${screensHtml}
            ${videoHtml}
        </div>`;
}

/* ================================================================
   ОТКРЫТЬ / ЗАКРЫТЬ МОДАЛКУ
================================================================ */
function openModal(type, id) {
    const item = type === 'funding'
        ? fundings.find(f => f.id === id)
        : games.find(g => g.id === id);
    if (!item) return;

    document.getElementById('modalContent').innerHTML = buildModalContent(item, type);
    document.getElementById('modalBox').scrollTop = 0;
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
    // Останавливаем iframe видео если было
    const iframe = document.querySelector('.modal-video-wrap iframe');
    if (iframe) iframe.src = iframe.src;
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ================================================================
   INIT
================================================================ */
renderFundings();
renderGames();
</script>
</body>
</html>
